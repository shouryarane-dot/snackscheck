<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍬</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>SnacksCheck – Rate & Discover Snacks | Nutri-Score & Allergen Filters</title>
    <meta name="description" content="Discover and rate snacks from around the world. Filter by Nutri-Score, allergens, calories and more. Community-powered snack reviews with 10,000+ products." />
    <meta name="keywords" content="snack reviews, snack ratings, Nutri-Score, allergen filter, chips, chocolate, snacks, community ratings, healthy snacks, snack database" />
    <link rel="canonical" href="https://snackscheck.com" />
    <meta name="google-site-verification" content="isjYGjHx8UDgINp3P1H43mVacYJvERH5iDSgDudX_yQ" />

    <!-- Open Graph (Facebook, WhatsApp previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://snackscheck.com" />
    <meta property="og:title" content="SnacksCheck – Rate & Discover Snacks" />
    <meta property="og:description" content="Community-powered snack ratings with Nutri-Score grades, allergen filters, and full nutrition data across 10,000+ products." />
    <meta property="og:image" content="https://snackscheck.com/og-image.png" />
    <meta property="og:locale" content="en_GB" />
    <meta property="og:locale:alternate" content="nl_NL" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SnacksCheck – Rate & Discover Snacks" />
    <meta name="twitter:description" content="Community-powered snack ratings with Nutri-Score, allergen filters, and 10,000+ products." />
    <meta name="twitter:image" content="https://snackscheck.com/og-image.png" />

    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "SnacksCheck",
      "url": "https://snackscheck.com",
      "description": "Community-powered snack ratings with Nutri-Score grades, allergen filters, and full nutrition data across 10,000+ products.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://snackscheck.com/?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: system-ui, -apple-system, sans-serif; background: #FAFAFA; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
